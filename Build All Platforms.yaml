name: Build TV Only

# 允许手动触发
on:
  workflow_dispatch:

jobs:
  build-tv:
    # 使用 Ubuntu 构建 Android (比 Mac/Windows 更快且更稳定)
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码 (已修复 Git 问题)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. 设置 Java 环境
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. 设置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.x' # 保持和你之前一致
          cache: true

      # 4. 依赖安装
      - name: Install Dependencies
        run: |
          cd simple_live_tv_app
          flutter pub get

      # 5. 构建 APK (TV 专用)
      - name: Build APK
        run: |
          cd simple_live_tv_app
          flutter build apk --release --split-per-abi

      # 6. 上传构建产物 (APK)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLive_TV_APK
          path: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
