name: Build All Platforms

于:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
  with:
    fetch-depth: 1
      
      # 设置 Java 环境
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      # 设置 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # 编译手机版 (simple_live_app)
      - name: Build APK (Mobile)
        run: |
          cd simple_live_app
          flutter build apk --release
          mkdir -p ../artifacts
          cp build/app/outputs/flutter-apk/app-release.apk ../artifacts/SimpleLive_Mobile.apk
      
      # 编译 TV版 (simple_live_tv_app)
      - name: Build APK (TV)
        run: |
          cd simple_live_tv_app
          flutter build apk --release
          mkdir -p ../artifacts
          cp build/app/outputs/flutter-apk/app-release.apk ../artifacts/SimpleLive_TV.apk
      
      # 上传安卓产物
      - name: Upload Artifacts (Android)
        uses: actions/upload-artifact@v3
        with:
          name: Android-APKs
          path: artifacts/

  build-web:
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - uses: actions/checkout@v3
      
      # 设置 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # 编译网页版
      - name: Build Web
        run: |
          flutter create . # 确保 web 文件夹存在
          flutter build web --release
          zip -r web_build.zip build/web
      
      # 上传网页产物
      - name: Upload Artifacts (Web)
        us
