name: Build TV Only

# 允许手动触发
on:
  workflow_dispatch:

jobs:
  build-tv:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码 (已优化为 v4 和浅层拉取)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. 设置 Java 环境
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. 设置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. 编译 TV 版 APK
      - name: Build TV APK
        run: |
          cd simple_live_app
          flutter build apk --release

      # 5. 上传构建产物
      - name: Upload TV APK
        uses: actions/upload-artifact@v3
        with:
          name: SimpleLive_TV
          path: simple_live_app/build/app/outputs/apk/release/app-release.apk
